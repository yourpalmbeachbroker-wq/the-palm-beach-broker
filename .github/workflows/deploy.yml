name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create site if needed and deploy
        run: |
          SITE_ID=$(netlify sites:list --json 2>/dev/null | python3 -c "import sys,json; sites=[s for s in json.load(sys.stdin) if s.get('name')=='the-palm-beach-broker']; print(sites[0]['id'] if sites else '')" 2>/dev/null || echo '')
          if [ -z "$SITE_ID" ]; then
            echo "Creating new Netlify site..."
            SITE_ID=$(netlify sites:create --name the-palm-beach-broker --account-slug yourpalmbeachbroker --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo '')
          fi
          if [ -n "$SITE_ID" ]; then
            netlify deploy --prod --dir=dist --site=$SITE_ID
          else
            netlify deploy --prod --dir=dist
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
