name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create Netlify site and deploy
        run: |
          # Get existing site ID or create new one via Netlify API
          SITE_ID=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites" | \
            python3 -c "import sys,json; data=json.load(sys.stdin); sites=[s for s in data if isinstance(data,list) and s.get('name')=='the-palm-beach-broker']; print(sites[0]['id'] if sites else '')" 2>/dev/null || echo '')

          if [ -z "$SITE_ID" ]; then
            echo "No existing site found. Creating new site via API..."
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"the-palm-beach-broker"}' \
              "https://api.netlify.com/api/v1/sites")
            echo "Create response: $RESPONSE"
            SITE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo '')
          fi

          echo "Using SITE_ID: $SITE_ID"

          if [ -n "$SITE_ID" ]; then
            netlify deploy --prod --dir=dist --site=$SITE_ID
          else
            echo "Failed to get/create site ID"
            exit 1
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
