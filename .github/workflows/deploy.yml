name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create Netlify site and deploy
        run: |
          # Try to get existing site ID via API
          SITE_ID=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites" | \
            python3 -c "import sys,json; sites=[s for s in json.load(sys.stdin) if s.get('name')=='the-palm-beach-broker']; print(sites[0]['id'] if sites else '')" 2>/dev/null || echo '')
          
          if [ -z "$SITE_ID" ]; then
            echo "Creating new Netlify site via API..."
            SITE_ID=$(curl -s -X POST \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"the-palm-beach-broker","account_slug":"yourpalmbeachbroker"}' \
              "https://api.netlify.com/api/v1/sites" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo '')
            echo "Created site ID: $SITE_ID"
          else
            echo "Found existing site ID: $SITE_ID"
          fi
          
          netlify deploy --prod --dir=dist --site=$SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
